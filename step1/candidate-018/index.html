<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slot-machine">
        <h1>AI Token Slot Machine</h1>
        <p class="flavor-text">Are you a 10x developer? Or just a prompt engineer? Spin to find out!</p>
        <div class="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div class="controls">
            <button id="spin-button">Spin</button>
        </div>
        <div class="balance">
            <p>Tokens: <span id="token-balance">100</span></p>
        </div>
        <div class="cost">
            <p>Cost per spin: <span id="spin-cost">10</span></p>
        </div>
        <div class="winnings">
            <p>Last Win: <span id="last-win">0</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
