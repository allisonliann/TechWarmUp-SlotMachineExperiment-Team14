<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="slot-machine">
        <h1>AI Tokenizer</h1>
        <div id="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div id="controls">
            <button id="spin-button">Spin</button>
            <p>Cost: 10 Tokens</p>
        </div>
        <div id="wallet">
            <h2>Your Wallet</h2>
            <p>Tokens: <span id="token-balance">100</span></p>
            <p>Last Win: <span id="last-win">0</span></p>
        </div>
        <div id="message-display"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
