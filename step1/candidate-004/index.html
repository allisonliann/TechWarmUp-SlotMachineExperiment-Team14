<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The LLM Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>The LLM Casino</h1>
            <div id="stats">
                <p>Context Window: <span id="balance">128,000</span> Tokens</p>
            </div>
        </header>

        <main>
            <div id="slot-machine">
                <div class="reel" id="reel1">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel2">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel3">
                    <div class="reel-strip"></div>
                </div>
                <div class="win-line"></div>
            </div>

            <div id="controls">
                <button id="spin-btn">GENERATE PROMPT (1k Tokens)</button>
                <button id="reset-btn" style="display: none;">REFILL COMPUTE</button>
            </div>

            <div id="message-area">
                <p id="status">Welcome to the future of gambling. Spin for AGI!</p>
            </div>
        </main>

        <footer>
            <p>Non-deterministic. Use at your own risk of hallucination.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
