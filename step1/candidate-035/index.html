<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Burner 9000</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slot-machine">
        <h1>AI Token Burner 9000</h1>
        <div class="displays">
            <div class="balance-display">Tokens: <span id="balance">100</span></div>
            <div class="message-display" id="message"></div>
        </div>
        <div class="reels">
            <div class="reel" id="reel1"></div>
            <div class="reel" id="reel2"></div>
            <div class="reel" id="reel3"></div>
        </div>
        <button id="spin-button">Spin (5 Tokens)</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
