<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Slot Machine - Token Guzzler 9000</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Token Guzzler 9000</h1>
            <p class="subtitle">Burning your investor's cash, one spin at a time.</p>
        </header>

        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🧠</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">💸</div>
            </div>

            <div class="controls">
                <button id="spin-btn">GENERATE RESPONSE</button>
            </div>
        </div>

        <div class="stats">
            <div class="token-display">Compute Tokens: <span id="tokens">500</span></div>
            <div class="cost-per-spin">Cost per prompt: 10 Tokens</div>
        </div>

        <div class="message-box" id="message">
            Ready to hallucinate?
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
