<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slot-machine">
        <div class="display">
            <p>Tokens: <span id="token-balance">100</span></p>
            <p id="message-display">Welcome! Spin to win tokens.</p>
        </div>
        <div class="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div class="controls">
            <button id="spin-button">Spin (5 Tokens)</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
