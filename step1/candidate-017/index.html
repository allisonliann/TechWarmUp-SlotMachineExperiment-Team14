<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="slot-machine">
        <h1>AI Token Slot Machine</h1>
        <div id="reels">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
        <div id="controls">
            <button id="spin-button">Spin</button>
            <div id="bet-controls">
                <button id="decrease-bet">-</button>
                <span id="bet-amount">10</span>
                <button id="increase-bet">+</button>
            </div>
        </div>
        <div id="info">
            <p>Tokens: <span id="token-balance">1000</span></p>
            <p id="message">Good luck!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
